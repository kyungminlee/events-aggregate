<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bay Area Kids & Family Events</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Header -->
  <header class="bg-gradient-to-r from-sky-500 to-violet-500 text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-5 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">🎉 Bay Area Family Events</h1>
        <p class="text-sky-100 text-sm mt-0.5">Kids &amp; family activities from Bay Area cities and libraries</p>
      </div>
      <div class="text-right text-xs text-sky-100">
        <div id="meta-updated"></div>
        <div id="meta-counts"></div>
      </div>
    </div>
  </header>

  <!-- Filters bar -->
  <div class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-3 flex flex-wrap gap-3 items-center">

      <!-- Search -->
      <input
        id="search"
        type="search"
        placeholder="Search events…"
        class="border border-slate-300 rounded-lg px-3 py-1.5 text-sm w-44 focus:outline-none focus:ring-2 focus:ring-sky-400"
      />

      <!-- Kids toggle -->
      <label class="flex items-center gap-2 cursor-pointer select-none">
        <input type="checkbox" id="filter-kids" checked class="sr-only peer" />
        <div class="toggle-pill peer-checked:bg-violet-500">
          <div class="toggle-knob"></div>
        </div>
        <span class="text-sm font-medium text-slate-700">👧 Kids &amp; Family only</span>
      </label>

      <!-- Library toggle -->
      <label class="flex items-center gap-2 cursor-pointer select-none">
        <input type="checkbox" id="filter-library" class="sr-only peer" />
        <div class="toggle-pill peer-checked:bg-emerald-500">
          <div class="toggle-knob"></div>
        </div>
        <span class="text-sm font-medium text-slate-700">📚 Library events only</span>
      </label>

      <!-- City filter -->
      <div class="relative">
        <select id="filter-city" class="border border-slate-300 rounded-lg px-3 py-1.5 text-sm appearance-none pr-7 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-white">
          <option value="">All sources</option>
        </select>
        <span class="pointer-events-none absolute right-2 top-2 text-slate-400 text-xs">▾</span>
      </div>

      <!-- Date range -->
      <div class="flex items-center gap-1">
        <input type="date" id="filter-date-from" class="border border-slate-300 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-sky-400" />
        <span class="text-slate-400 text-xs">–</span>
        <input type="date" id="filter-date-to" class="border border-slate-300 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-sky-400" />
      </div>

      <!-- Reset -->
      <button id="reset-filters" class="text-xs text-slate-400 hover:text-slate-600 underline">Reset</button>

      <!-- Count -->
      <span id="result-count" class="ml-auto text-xs text-slate-500 font-medium"></span>
    </div>
  </div>

  <!-- Main content -->
  <main class="max-w-6xl mx-auto px-4 py-6">
    <div id="loading" class="text-center py-20 text-slate-400">
      <div class="text-4xl mb-3">⏳</div>
      <p>Loading events…</p>
    </div>
    <div id="error-msg" class="hidden text-center py-20 text-red-400">
      <div class="text-4xl mb-3">⚠️</div>
      <p id="error-text">Could not load events.</p>
    </div>
    <div id="events-grid" class="hidden grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
    <div id="no-results" class="hidden text-center py-20 text-slate-400">
      <div class="text-4xl mb-3">🔍</div>
      <p>No events match your filters.</p>
    </div>
  </main>

  <!-- Event card template -->
  <template id="card-tpl">
    <article class="event-card bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden flex flex-col hover:shadow-md transition-shadow">
      <div class="card-img-wrap relative h-36 bg-slate-100 overflow-hidden hidden">
        <img class="card-img w-full h-full object-cover" alt="" loading="lazy" />
      </div>
      <div class="p-4 flex flex-col flex-1 gap-2">
        <div class="flex items-start justify-between gap-2">
          <h2 class="card-title font-semibold text-slate-800 text-sm leading-snug line-clamp-2"></h2>
          <span class="card-kids-badge shrink-0 text-xs px-1.5 py-0.5 rounded-full bg-violet-100 text-violet-700 font-medium hidden">👧 Kids</span>
        </div>
        <div class="card-date text-sky-600 text-xs font-medium"></div>
        <div class="card-location text-slate-500 text-xs truncate hidden"></div>
        <p class="card-desc text-slate-600 text-xs line-clamp-3 flex-1 hidden"></p>
        <div class="flex items-center justify-between mt-1">
          <span class="card-source-badge text-xs px-2 py-0.5 rounded-full font-medium"></span>
          <a class="card-link text-xs text-sky-500 hover:text-sky-700 font-medium" target="_blank" rel="noopener">Details →</a>
        </div>
        <div class="card-cats flex flex-wrap gap-1 hidden"></div>
      </div>
    </article>
  </template>

  <script src="app.js?v=2"></script>
</body>
</html>
